<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GridPop!</title>
    <meta name="description" content="Drop &amp; Pop" />

    <!-- Open Graph -->
    <meta property="og:title" content="GridPop!" />
    <meta property="og:description" content="Drop &amp; Pop" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gridpop.app" />
    <meta property="og:image" content="https://gridpop.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GridPop!" />
    <meta name="twitter:description" content="Drop &amp; Pop" />
    <meta name="twitter:image" content="https://gridpop.app/og.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      .landscape-block {
        display: none;
      }

      @media (orientation: landscape) and (pointer: coarse) {
        .landscape-block {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 2rem;
          position: fixed;
          inset: 0;
          z-index: 99999;
          background:
            radial-gradient(circle at 12% 12%, rgba(255, 150, 210, 0.28) 0%, transparent 42%),
            radial-gradient(circle at 88% 18%, rgba(120, 200, 255, 0.28) 0%, transparent 38%),
            linear-gradient(160deg, #dfc8ff 0%, #c0dcff 100%);
          color: #fff;
        }

        .landscape-block-icon {
          opacity: 0.9;
          filter: drop-shadow(2px 2px 0 #e060b0);
        }

        .landscape-block-text {
          margin: 0;
          font-family: "Press Start 2P", monospace;
          font-size: clamp(0.7rem, 3.5vw, 1rem);
          letter-spacing: 0.08em;
          text-transform: uppercase;
          text-align: center;
          color: #fff;
          text-shadow: 2px 2px 0 #e060b0;
        }
      }
    </style>
  </head>
  <body>
    <div class="landscape-block" aria-label="Please rotate your device to portrait">
      <svg class="landscape-block-icon" viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M36 24a12 12 0 1 1-12-12" />
        <polyline points="24,7 28,12 23,12" />
      </svg>
      <p class="landscape-block-text">Rotate Your Device</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
